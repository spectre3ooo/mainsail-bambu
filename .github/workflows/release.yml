name: Bambu release

# Fork-owned release workflow. Upstream Mainsail workflows are intentionally disabled.

run-name: Release ${{ github.ref_name }} @ ${{ github.sha }}

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      tag:
        type: string
        description: Optional release tag, e.g. v1.0.0-bambu
        required: false

permissions:
  contents: write

concurrency:
  group: bambu-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Mainsail-Bambu
    runs-on: ubuntu-latest
    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build release artifact
        run: npm run build

      - name: Verify release artifact
        run: test -f dist/mainsail.zip

      - name: Resolve release metadata
        id: release
        shell: bash
        run: |
          package_version=$(node -p "require('./package.json').version")
          short_sha=$(git rev-parse --short=8 HEAD)
          manual_tag='${{ inputs.tag }}'

          if [[ -n "$manual_tag" ]]; then
            tag="$manual_tag"
          else
            tag="v${package_version}-bambu.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}-${short_sha}"
          fi

          {
            echo "tag=$tag"
            echo "title=$tag"
            echo "notes<<EOF"
            echo "Mainsail-Bambu build for commit ${GITHUB_SHA}."
            echo ""
            echo "Install with bambu-raker by setting:"
            echo "MAINSAIL_REPO=${GITHUB_REPOSITORY}"
            echo "MAINSAIL_VERSION=$tag"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create '${{ steps.release.outputs.tag }}' \
            dist/mainsail.zip \
            --title '${{ steps.release.outputs.title }}' \
            --notes '${{ steps.release.outputs.notes }}' \
            --target "$GITHUB_SHA" \
            --latest
